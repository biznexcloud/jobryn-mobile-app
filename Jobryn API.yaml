  /api/v1/companies/:
    get:
      operationId: v1_companies_list
      parameters:
      - in: query
        name: company_size
        schema:
          type: string
          enum:
          - 1-10
          - 1001-5000
          - 11-50
          - 201-500
          - 5001+
          - 501-1000
          - 51-200
        description: |-
          * `1-10` - 1-10 employees
          * `11-50` - 11-50 employees
          * `51-200` - 51-200 employees
          * `201-500` - 201-500 employees
          * `501-1000` - 501-1,000 employees
          * `1001-5000` - 1,001-5,000 employees
          * `5001+` - 5,001+ employees
      - in: query
        name: industry
        schema:
          type: string
      - in: query
        name: location
        schema:
          type: string
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
